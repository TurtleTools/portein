default_install_hook_types: [pre-commit, pre-push]

# Skip data files that have format-significant whitespace / custom yaml tags.
exclude: |
  (?x)^(
    examples/.*\.pdb |
    examples/.*\.cif |
    examples/README_files/.*
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^README\.md$  # auto-generated by nbconvert-readme below
      - id: end-of-file-fixer
        exclude: ^README\.md$
      - id: check-yaml
        # configs/*.yaml and examples/pymol_layers_example.yaml use custom
        # `!PymolConfig` / `!ColorType` tags — let pyyaml accept them.
        args: [--unsafe]
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]

  # Lint + format (replaces flake8 + black + isort)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Regenerate README.md from README.ipynb whenever the notebook changes.
  # Runs locally so it picks up `jupyter` from the dev env (`environment.yml`).
  - repo: local
    hooks:
      - id: nbconvert-readme
        name: regenerate README.md from README.ipynb
        entry: jupyter nbconvert --to markdown --NbConvertApp.output_files_dir=examples/README_files README.ipynb
        language: system
        files: ^README\.ipynb$
        pass_filenames: false

      # Type-check the portein package. mypy is slow and biotite/numba have no
      # stubs, so we run it pre-push only and ignore missing imports.
      - id: mypy
        name: mypy (pre-push)
        entry: mypy --ignore-missing-imports --no-strict-optional portein
        language: system
        pass_filenames: false
        stages: [pre-push]
        types: [python]

      # Run the full pytest suite before pushing. pre-push (not pre-commit) so
      # local commits stay fast; CI runs the same suite on the server.
      - id: pytest
        name: pytest (pre-push)
        entry: pytest -x -q
        language: system
        pass_filenames: false
        stages: [pre-push]
        types: [python]
