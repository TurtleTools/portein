# Jupyter Book configuration — see https://jupyterbook.org/en/stable/customize/config.html
title: Portein
author: Jay
copyright: "2024"
logo: ""

# Force re-execution of notebooks on each build.
execute:
  execute_notebooks: cache
  timeout: 600
  allow_errors: false

# LaTeX/PDF output
latex:
  latex_documents:
    targetname: portein.tex

# BibTeX citations
bibtex_bibfiles:
  - references.bib

# HTML output
html:
  use_repository_button: true
  use_issues_button: true
  use_edit_page_button: true
  home_page_in_navbar: false

repository:
  url: https://github.com/TurtleTools/portein
  branch: main
  path_to_book: docs

# Sphinx-level configuration
sphinx:
  extra_extensions:
    - sphinx.ext.autodoc
    - sphinx.ext.autosummary
    - sphinx.ext.intersphinx
    - sphinx.ext.napoleon
  config:
    # API autosummary
    autosummary_generate: true
    autodoc_typehints: description
    napoleon_numpy_docstring: true
    # Cross-link external libraries
    intersphinx_mapping:
      python: ["https://docs.python.org/3", null]
      numpy: ["https://numpy.org/doc/stable", null]
      matplotlib: ["https://matplotlib.org/stable", null]
      biotite: ["https://www.biotite-python.org/latest", null]
      peppr: ["https://peppr.proximabio.com", null]
    # autosummary emits ``:toctree:`` directives that JB1's external-toc
    # plugin warns about. The warning is cosmetic — the API pages
    # generate correctly — but `--warningiserror` in CI would fail the
    # build. Suppress just this one.
    suppress_warnings:
      - etoc.toctree
